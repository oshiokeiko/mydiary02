<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEP1：書く＋一覧</title>

  <!-- Tailwind CSS（見た目を整える外部ライブラリ） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 共通の自前CSS（1つ上のフォルダにある style.css を読み込む） -->
  <link rel="stylesheet" href="../style.css">
</head>

<body class="bg-slate-900 text-white min-h-screen">

  <main class="max-w-2xl mx-auto px-4 py-8">

    <!-- このステップが何を学ぶ段階かのメモ -->
    <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 mb-8 text-sm text-slate-300">
      <p class="font-bold text-white mb-1">📘 STEP1：書く＋一覧表示</p>
      <p>日記を「配列」にためて、「繰り返し」で1件ずつ画面に並べます。</p>
      <p class="text-yellow-400">※このステップではまだ保存しません。リロードすると消えます。</p>
    </div>

    <h1 class="text-2xl font-bold mb-6">📔 My Diary</h1>

    <!-- ===== 入力フォーム（いつも画面に出しっぱなし）===== -->
    <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 mb-8">
      <!-- タイトル入力欄 -->
      <input
        id="input-title"
        type="text"
        placeholder="タイトル"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 mb-3 placeholder-slate-400 focus:outline-none focus:border-blue-500"
      >
      <!-- 本文入力欄 -->
      <textarea
        id="input-body"
        rows="4"
        placeholder="今日はどんな日でしたか..."
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 mb-3 placeholder-slate-400 focus:outline-none focus:border-blue-500 resize-none"
      ></textarea>
      <!-- 追加ボタン -->
      <button
        id="add-btn"
        class="bg-blue-600 hover:bg-blue-500 font-bold py-2 px-5 rounded-lg transition-colors"
      >追加する</button>
    </div>

    <!-- ===== 日記の一覧（ここに JavaScript がカードを並べる）===== -->
    <div id="diary-list" class="grid grid-cols-1 gap-4"></div>

  </main>

  <!-- jQuery（$ という書き方が使えるようになる） -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- このステップの動き -->
  <script src="step1.js"></script>

</body>

</html>
