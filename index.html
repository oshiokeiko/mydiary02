<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diary</title>

  <!-- Tailwind CSS（見た目を整える外部ライブラリ） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 自前のCSS（Tailwindで補えない部分だけ） -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-900 text-white min-h-screen">

  <!-- ===== ヘッダー ===== -->
  <header class="bg-slate-800 border-b border-slate-700">
    <div class="max-w-2xl mx-auto px-4 py-4">
      <h1 class="text-2xl font-bold">📔 My Diary</h1>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">

    <!-- ===== 入力フォーム（いつも画面に出しっぱなし）===== -->
    <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 mb-8">

      <!-- タイトル -->
      <input
        id="input-title"
        type="text"
        placeholder="タイトル"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 mb-3 placeholder-slate-400 focus:outline-none focus:border-blue-500"
      >

      <!-- 気分の絵文字えらび -->
      <p class="text-sm text-slate-300 mb-2">今日の気分</p>
      <div id="mood-selector" class="flex gap-2 flex-wrap mb-3">
        <!-- data-mood に絵文字を持たせておき、JavaScript から読み取る -->
        <button class="mood-btn" data-mood="😊">😊</button>
        <button class="mood-btn" data-mood="😢">😢</button>
        <button class="mood-btn" data-mood="😡">😡</button>
        <button class="mood-btn" data-mood="😴">😴</button>
        <button class="mood-btn" data-mood="🥰">🥰</button>
        <button class="mood-btn" data-mood="🤔">🤔</button>
      </div>

      <!-- 本文 -->
      <textarea
        id="input-body"
        rows="4"
        placeholder="今日はどんな日でしたか..."
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 mb-3 placeholder-slate-400 focus:outline-none focus:border-blue-500 resize-none"
      ></textarea>

      <!-- 追加ボタン -->
      <button
        id="add-btn"
        class="bg-blue-600 hover:bg-blue-500 font-bold py-2 px-5 rounded-lg transition-colors"
      >追加する</button>
    </div>

    <!-- 日記が0件のときに出す案内 -->
    <div id="empty-message" class="text-center text-slate-400 py-16 hidden">
      <p class="text-5xl mb-3">📭</p>
      <p>まだ日記がありません。上のフォームから書いてみましょう。</p>
    </div>

    <!-- ===== 日記の一覧（ここに JavaScript がカードを並べる）===== -->
    <div id="diary-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

  </main>

  <!-- jQuery（$ という書き方が使えるようになる） -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- 自前のロジック（jQueryの後に読み込む） -->
  <script src="app.js"></script>

</body>

</html>
